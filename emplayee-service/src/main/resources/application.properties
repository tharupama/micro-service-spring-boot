spring.application.name=emplayee-service
spring.config.import=optional:configserver:http://localhost:8888
#server.port=8081
#spring.datasource.url=jdbc:mysql://localhost:3309/employee_db_1?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=1234
#
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.hibernate.ddl-auto=update
#
#eureka.client.serverUrl.defaultZone=http://localhost:8761/eureka

management.endpoints.web.exposure.include=*
#
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Enable tracing and sample 100% of requests
management.tracing.export.enabled=true
management.tracing.sampling.probability=1.0


# Tell Spring Boot where your Zipkin server is running
management.tracing.export.zipkin.endpoint=http://localhost:9492/api/v2/spans

#spring.cloud.openfeign.micrometer.enabled=true

#circuit breacker configuarations
resilience4j.circuitbreaker.instances.emplayee-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.emplayee-service.failure-rate-threshold=50
#check minimmum faliure requsts before open circuit
resilience4j.circuitbreaker.instances.emplayee-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.emplayee-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.emplayee-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.emplayee-service.permitted-number-of-calls-in-half-open-state=3
#request 10k awata apsse faliure rate eka gananaya karanna
resilience4j.circuitbreaker.instances.emplayee-service.sliding-window-size=10
#count ekenda time ekenda gananaya karanne kiyala
resilience4j.circuitbreaker.instances.emplayee-service.sliding-window-type=count_based


#Actuater end points for circuit breakers
management.health.circuitbreakers.enabled=true
management.endpoint.web.exposure.include=health
management.endpoint.health.show-details=always

#retry configuration
resilience4j.retry.instances.emplayee-service.registerHealthIndicator=true
resilience4j.retry.instances.emplayee-service.max-attempts=5
resilience4j.retry.instances.emplayee-service.wait-duration = 3s
